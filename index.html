<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>El Pasaporte Sinfónico — El podcast donde la música viaja</title>
  <meta name="description" content="Un podcast que conecta música y viaje: cada episodio recorre la ciudad que le dio forma a un género. Escucha el episodio, sigue la guía y planea tu propio circuito.">
  <link rel="stylesheet" href="./ds/styles.css">
  <style>
    /* ── Layout helpers ── */
    html { font-size: 17px; } /* baseline legible; escala todos los rem ~6% */
    .section      { padding: 5rem 2rem; }
    .section--alt { padding: 5rem 2rem; background: var(--surface-deep); }
    .inner        { max-width: var(--container); margin: 0 auto; }
    .grid-3       { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; margin-top: 2rem; }

    /* ── Nav ── */
    .nav {
      position: sticky; top: 0; z-index: 1000;
      height: var(--nav-height);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem;
      background: var(--surface-nav); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-faint);
    }
    .nav__brand   { display: flex; align-items: center; gap: .7rem; text-decoration: none; }
    .nav__brand img { height: 38px; }
    .nav__brand span { font-family: var(--f-label); font-size: .86rem; font-weight: 600; letter-spacing: .18em; text-transform: uppercase; color: var(--bone); }
    .nav__links   { display: flex; gap: 1.6rem; }
    .nav__links a { font-family: var(--f-label); font-size: .80rem; letter-spacing: .18em; text-transform: uppercase; color: var(--smoke); text-decoration: none; }
    .nav__links a:hover { color: var(--accent); }
    @media (max-width: 760px) { .nav__links { display: none; } }

    /* ── Hero ── */
    .hero {
      position: relative; min-height: 86vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 6rem 2rem; overflow: hidden;
    }
    .hero__bg {
      position: absolute; inset: 0; z-index: 0;
      background:
        linear-gradient(to bottom, rgba(10,8,6,.50) 0%, rgba(10,8,6,.92) 100%),
        url('https://images.pexels.com/photos/1763075/pexels-photo-1763075.jpeg?auto=compress&cs=tinysrgb&w=1920')
        center / cover no-repeat !important;
    }
    .hero__inner {
      position: relative; z-index: 1;
      max-width: 760px; display: flex; flex-direction: column; align-items: center; gap: .5rem;
    }
    .hero__title {
      font-family: var(--f-display); font-size: var(--fs-hero);
      line-height: .9; letter-spacing: .05em; text-transform: uppercase;
      color: var(--bone); text-shadow: var(--glow-hero); margin: .6rem 0;
    }
    .hero__kicker { font-family: var(--f-label); font-size: .84rem; font-weight: 700; letter-spacing: .3em; text-transform: uppercase; color: var(--smoke); }
    .hero__lead   { font-family: var(--f-body); font-size: 1.18rem; line-height: 1.9; color: var(--text-soft); max-width: 620px; margin: 1.4rem 0 2rem; }
    .hero__cta    { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }

    /* ── Manifiesto ── */
    .manifesto { max-width: 760px; margin: 0 auto; }

    /* ── Tira fotográfica (divisor cinematográfico entre secciones) ── */
    .photo-strip { width: 100%; height: 320px; overflow: hidden; position: relative; }
    .photo-strip img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-strip__overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to right, rgba(10,8,6,.85) 0%, rgba(10,8,6,.40) 55%, rgba(10,8,6,.60) 100%);
      display: flex; align-items: center; padding: 0 clamp(2rem, 6vw, 5rem);
    }
    .photo-strip__text {
      font-family: var(--f-head); font-style: italic;
      font-size: clamp(1.2rem, 3vw, 2rem);
      color: var(--bone); max-width: 520px; line-height: 1.55;
    }
    .photo-strip__text em { color: var(--accent); font-family: var(--f-head); }

    /* ── Imágenes en tarjetas ── */
    .ep-card__img { width: 100%; height: 190px; overflow: hidden; margin-bottom: .9rem; background: var(--surface-deep); }
    .ep-card__img img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .45s ease; }
    .ep-card__img:hover img { transform: scale(1.05); }

    /* ── Episodios ── */
    .ep-card__platforms { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: .8rem; }
    .ep-card__guidelink { display: inline-block; margin-top: .9rem; font-family: var(--f-label); font-size: .76rem; font-weight: 600; letter-spacing: .15em; text-transform: uppercase; color: var(--accent); }

    .more-episodes { margin-top: 3.5rem; padding-top: 2.5rem; border-top: 1px solid var(--rule); }
    .more-episodes__label { font-family: var(--f-label); font-size: .80rem; letter-spacing: .22em; text-transform: uppercase; color: var(--smoke); margin: 0 0 1.5rem; }
    .ep-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; }
    .ep-row {
      display: flex; align-items: center; justify-content: space-between; gap: 1.5rem;
      flex-wrap: wrap; padding: 1.2rem 0; border-bottom: 1px solid var(--rule);
    }
    .ep-row__main { display: flex; flex-direction: column; gap: .3rem; min-width: 220px; }
    .ep-row__category { font-family: var(--f-label); font-size: .74rem; font-weight: 600; letter-spacing: .2em; text-transform: uppercase; color: var(--secondary-glow); }
    .ep-row__title { font-family: var(--f-head); font-size: 1.05rem; font-weight: 700; color: var(--bone); margin: 0; }
    .ep-row__actions { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .ep-row__platforms { display: flex; gap: .4rem; flex-wrap: wrap; }
    .ep-row__guide-soon { font-family: var(--f-label); font-size: .74rem; letter-spacing: .1em; text-transform: uppercase; color: var(--smoke); white-space: nowrap; }

    /* ── Recursos / agregadores turísticos ── */
    .resources { margin-top: 3rem; padding-top: 2.5rem; border-top: 1px solid var(--rule); text-align: center; }
    .resources__label { font-family: var(--f-label); font-size: .80rem; letter-spacing: .22em; text-transform: uppercase; color: var(--smoke); margin: 0 0 1.2rem; }
    .resources__links { display: flex; gap: .8rem; flex-wrap: wrap; justify-content: center; }

    /* ── Redes ── */
    .social-row { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; margin-top: 1rem; }

    /* ── Formulario de contacto ── */
    .form { display: flex; flex-direction: column; gap: 1.3rem; max-width: 680px; margin: 0 auto; }
    .form__row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.3rem; }
    @media (max-width: 600px) { .form__row { grid-template-columns: 1fr; } }
    .form__field { display: flex; flex-direction: column; gap: .5rem; }
    .form__label { font-family: var(--f-label); font-size: .80rem; letter-spacing: .18em; text-transform: uppercase; color: var(--smoke); }
    .form__input {
      width: 100%; background: var(--surface-card); border: 1px solid var(--rule); color: var(--bone);
      font-family: var(--f-body); font-size: 1rem; padding: .85rem 1rem;
      border-radius: var(--radius-none); transition: border-color var(--dur-fast) var(--ease-out);
    }
    .form__input:focus { outline: none; border-color: var(--border-accent); box-shadow: var(--ring); }
    .form__textarea { resize: vertical; min-height: 140px; font-family: var(--f-body); }
    select.form__input { appearance: none; cursor: pointer; }
    .form__note { font-family: var(--f-label); font-size: .78rem; letter-spacing: .08em; color: var(--smoke); margin: -.6rem 0 0; }

    .form-sent { max-width: 680px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.1rem; }
    .form-sent__title { font-family: var(--f-head); font-size: 1.4rem; color: var(--bone); margin: 0; }
    .form-sent__lead { font-family: var(--f-body); color: var(--text-soft); margin: 0; }
    .form-sent__lead strong { color: var(--accent); font-style: normal; }
    .form-sent__preview {
      background: var(--surface-card); border: 1px solid var(--rule); color: var(--parch);
      font-family: var(--f-body); font-size: .92rem; line-height: 1.7;
      padding: 1.2rem; white-space: pre-wrap; word-break: break-word; margin: 0;
    }
    .form-sent__actions { display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }

    /* ── Footer ── */
    .footer { text-align: center; padding: 4rem 2rem; border-top: 1px solid var(--rule); background: var(--base-1); }
    .footer img  { height: 80px; width: auto; margin: 0 auto 1rem; opacity: .9; }
    .footer__tag  { font-family: var(--f-head); font-style: italic; font-size: 1.25rem; color: var(--accent); margin: 0 0 1.2rem; }
    .footer__links { display: flex; gap: 1.4rem; flex-wrap: wrap; justify-content: center; margin: 0 0 1.4rem; }
    .footer__links a { font-family: var(--f-label); font-size: .76rem; letter-spacing: .15em; text-transform: uppercase; color: var(--smoke); text-decoration: none; }
    .footer__links a:hover { color: var(--accent); }
    .footer__copy { font-family: var(--f-label); font-size: .74rem; letter-spacing: .15em; text-transform: uppercase; color: var(--smoke); margin: 0; }
  </style>
</head>

      { id: 'cordillera', category: 'Especial', title: 'Festival Cordillera — Bogotá', spotify: null, ivoox: 'https://www.ivoox.com/en/episodio-especial-8211-festival-cordillera-bogota-audios-mp3_rf_91996985_1.html' },
      { id: 'rock-cleveland', category: 'Rock and Roll', title: 'Rock and Roll — Cleveland', spotify: null, ivoox: 'https://www.ivoox.com/en/episodio-2-rock-and-roll-cleveland-audios-mp3_rf_89428270_1.html' },
    ].map(ep => ({ ...ep, spotify: ep.spotify || SPOTIFY_SHOW, ivoox: ep.ivoox || IVOOX_SHOW, fountain: FOUNTAIN_SHOW }));

    const SOCIALS = [
      { label: 'Instagram', href: 'https://www.instagram.com/elpasaportesinfonico?igsh=MXQ3MXh6OTNweHQ5bw==' },
      { label: 'YouTube',   href: 'https://www.youtube.com/@elpasaportesinfonico4071' },
      { label: 'Facebook',  href: 'https://www.facebook.com/profile.php?id=100079151904836&locale=es_LA' },
      { label: 'TikTok',    href: 'https://www.tiktok.com/@elpasaportesinfonico' },
      { label: 'X',         href: 'https://x.com/elpassinfonico' },
    ];

    const CONTACT_EMAIL = 'elpasaportesinfonico@gmail.com';

    // ── Nav ──────────────────────────────────────────────────────────────────
    function Nav() {
      return (
        <nav className="nav">
          <a className="nav__brand" href="#top">
            <img src="./assets/logo-white.png" alt="El Pasaporte Sinfónico" />
            <span>El Pasaporte Sinfónico</span>
          </a>
          <div className="nav__links">
            {NAV_LINKS.map(l => <a key={l.href} href={l.href}>{l.label}</a>)}
          </div>
          <Button variant="ghost" size="sm" href="#episodios">▶ Escuchar</Button>
        </nav>
      );
    }

    // ── Hero ─────────────────────────────────────────────────────────────────
    function Hero() {
      return (
        <header className="hero" id="top">
          <div className="hero__bg" />
          <div className="hero__inner">
            <span className="hero__kicker">Un podcast de viajes y música</span>
            <h1 className="hero__title">El Pasaporte Sinfónico</h1>
            <span className="hero__kicker">Música · Turismo regenerativo · Historias reales</span>
            <p className="hero__lead">
              Cada episodio recorre la ciudad que le dio forma a un género — el bar donde nació
              una banda, la fábrica que inspiró un riff, el barrio que hoy le devuelve algo a la
              tierra que lo vio crecer.
            </p>
            <div className="hero__cta">
              <Button variant="primary" href="#episodios">Escuchar episodios</Button>
              <Button variant="ghost" href="#guias">Ver guías de viaje</Button>
            </div>
          </div>
        </header>
      );
    }

    // ── Manifiesto ───────────────────────────────────────────────────────────
    function Manifiesto() {
      return (
        <section className="section">
          <div className="inner manifesto">
            <Quote source="— El Pasaporte Sinfónico">
              Cada ciudad suena distinto si sabes escucharla. Nosotros seguimos el rastro: el
              escenario donde todo empezó, las calles que lo inspiraron, y una forma de viajar
              que deja algo bueno a su paso.
            </Quote>
          </div>
        </section>
      );
    }

    // ── Episodios ────────────────────────────────────────────────────────────
    function Episodios() {
      return (
        <section className="section" id="episodios">
          <div className="inner">
            <SectionHeader
              tag="Episodios"
              title="Cada ciudad tiene<br><em>una banda sonora</em>"
              lead="Escucha donde prefieras. Los episodios con guía de viaje completa están destacados; el resto del catálogo está más abajo."
            />
            <div className="grid-3">
              {FEATURED_EPISODES.map(ep => (
                <Card
                  key={ep.id}
                  type={ep.category}
                  typeColor={ep.typeColor}
                  title={ep.title}
                  meta={ep.kicker}
                  description={ep.description}
                >
                  <div className="ep-card__img">
                    <img src={ep.img} alt={ep.title} loading="lazy" />
                  </div>
                  <div className="ep-card__platforms">
                    <Button variant="quiet" size="sm" href={ep.spotify} target="_blank" rel="noopener noreferrer">Spotify</Button>
                    <Button variant="quiet" size="sm" href={ep.ivoox} target="_blank" rel="noopener noreferrer">iVoox</Button>
                    <Button variant="quiet" size="sm" href={ep.fountain} target="_blank" rel="noopener noreferrer">Fountain.fm</Button>
                  </div>
                  <a className="ep-card__guidelink" href={ep.guideHref} target="_blank" rel="noopener noreferrer">📖 Ver guía de viaje →</a>
                </Card>
              ))}
            </div>

            <div className="more-episodes">
              <p className="more-episodes__label">Todo el catálogo · {MORE_EPISODES.length + FEATURED_EPISODES.length} episodios publicados</p>
              <ul className="ep-list">
                {MORE_EPISODES.map(ep => (
                  <li className="ep-row" key={ep.id}>
                    <div className="ep-row__main">
                      <span className="ep-row__category">{ep.category}</span>
                      <h4 className="ep-row__title">{ep.title}</h4>
                    </div>
                    <div className="ep-row__actions">
                      <div className="ep-row__platforms">
                        <Button variant="quiet" size="sm" href={ep.spotify} target="_blank" rel="noopener noreferrer">Spotify</Button>
                        <Button variant="quiet" size="sm" href={ep.ivoox} target="_blank" rel="noopener noreferrer">iVoox</Button>
                        <Button variant="quiet" size="sm" href={ep.fountain} target="_blank" rel="noopener noreferrer">Fountain.fm</Button>
                      </div>
                      <span className="ep-row__guide-soon">Pronto publicaremos la guía para este episodio</span>
                    </div>
                  </li>
                ))}
              </ul>
            </div>
          </div>
        </section>
      );
    }

    // ── Guías ────────────────────────────────────────────────────────────────
    function Guias() {
      return (
        <section className="section--alt" id="guias">
          <div className="inner">
            <SectionHeader
              tag="Guías de viaje"
              title="La guía completa de<br><em>cada episodio</em>"
              lead="Transporte, alojamiento y el circuito día a día — todo lo que recorrimos en el episodio, listo para que lo repitas."
            />
            <div className="grid-3">
              {FEATURED_EPISODES.filter((ep, i, arr) => arr.findIndex(e => e.guideHref === ep.guideHref) === i).map(ep => (
                <Card
                  key={ep.id}
                  type="Guía completa"
                  typeColor={ep.typeColor}
                  title={ep.title}
                  description={ep.guideDescription}
                  links={ep.guideTags}
                  href={ep.guideHref}
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  <div className="ep-card__img" style={{ marginTop: '.5rem' }}>
                    <img src={ep.img} alt={ep.title} loading="lazy" />
                  </div>
                </Card>
              ))}
            </div>

            <div className="resources">
              <p className="resources__label">Recursos para planear tu viaje</p>
              <div className="resources__links">
                <Button variant="ghost" size="sm" href="https://www.booking.com/" target="_blank" rel="noopener noreferrer">Booking.com</Button>
                <Button variant="ghost" size="sm" href="https://www.skyscanner.net/" target="_blank" rel="noopener noreferrer">Skyscanner</Button>
                <Button variant="ghost" size="sm" href="https://www.getyourguide.com/" target="_blank" rel="noopener noreferrer">GetYourGuide</Button>
                <Button variant="ghost" size="sm" href="https://www.airbnb.com/" target="_blank" rel="noopener noreferrer">Airbnb</Button>
              </div>
            </div>
          </div>
        </section>
      );
    }

    // ── Redes ────────────────────────────────────────────────────────────────
    function Redes() {
      return (
        <section className="section" id="redes">
          <div className="inner">
            <SectionHeader
              align="center"
              tag="Síguenos"
              title="El viaje sigue<br><em>entre episodios</em>"
              lead="Adelantos, fotos del circuito y el detrás de cámaras de cada grabación."
            />
            <div className="social-row">
              {SOCIALS.map(s => (
                <Button key={s.label} variant="ghost" href={s.href} target="_blank" rel="noopener noreferrer">{s.label}</Button>
              ))}
            </div>
          </div>
        </section>
      );
    }

    // ── Contacto ─────────────────────────────────────────────────────────────
    function Contacto() {
      const [form, setForm] = useState({ nombre: '', email: '', motivo: 'Colaboración', mensaje: '' });
      const [sent, setSent] = useState(false);
      const [copied, setCopied] = useState(false);

      function handleChange(e) {
        const { name, value } = e.target;
        setForm(f => ({ ...f, [name]: value }));
      }

      const subject = `[${form.motivo}] Contacto desde la web — ${form.nombre}`;
      const body = `${form.mensaje}\n\n—\n${form.nombre}\n${form.email}`;
      const mailtoHref = `mailto:${CONTACT_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

      function handleSubmit(e) {
        e.preventDefault();
        // Pintamos la confirmación + el mensaje copiable ANTES de tocar
        // mailto:. Algunos navegadores interrumpen el JS en plena ejecución
        // al disparar el selector de app externa, así que si mailto: no
        // hace nada (o corta la función a la mitad), el respaldo ya quedó
        // visible de todas formas.
        setCopied(false);
        setSent(true);
        setTimeout(() => { window.location.href = mailtoHref; }, 0);
      }

      function handleCopy() {
        const text = `Para: ${CONTACT_EMAIL}\nAsunto: ${subject}\n\n${body}`;
        if (navigator.clipboard) {
          navigator.clipboard.writeText(text).then(() => setCopied(true)).catch(() => setCopied(false));
        }
      }

      return (
        <section className="section--alt" id="contacto">
          <div className="inner">
            <SectionHeader
              tag="Contacto"
              title="Hablemos de tu<br><em>próximo viaje sonoro</em>"
              lead="Colaboraciones, prensa, auspicios o una idea para el próximo episodio — escríbenos."
            />

            {sent ? (
              <div className="form-sent">
                <p className="form-sent__title">¿No se abrió tu correo?</p>
                <p className="form-sent__lead">
                  No pasa nada — copia el mensaje y envíalo a <strong>{CONTACT_EMAIL}</strong> desde donde prefieras.
                </p>
                <pre className="form-sent__preview">{`Para: ${CONTACT_EMAIL}\nAsunto: ${subject}\n\n${body}`}</pre>
                <div className="form-sent__actions">
                  <Button variant="primary" onClick={handleCopy}>{copied ? '✓ Mensaje copiado' : 'Copiar mensaje'}</Button>
                  <Button variant="ghost" href={mailtoHref}>Intentar abrir correo de nuevo</Button>
                  <Button variant="quiet" onClick={() => setSent(false)}>← Volver al formulario</Button>
                </div>
              </div>
            ) : (
              <form className="form" onSubmit={handleSubmit}>
                <div className="form__row">
                  <label className="form__field">
                    <span className="form__label">Nombre</span>
                    <input className="form__input" type="text" name="nombre" required value={form.nombre} onChange={handleChange} />
                  </label>
                  <label className="form__field">
                    <span className="form__label">Email</span>
                    <input className="form__input" type="email" name="email" required value={form.email} onChange={handleChange} />
                  </label>
                </div>
                <label className="form__field">
                  <span className="form__label">Motivo</span>
                  <select className="form__input" name="motivo" value={form.motivo} onChange={handleChange}>
                    <option>Colaboración</option>
                    <option>Prensa y medios</option>
                    <option>Auspicio o sponsoreo</option>
                    <option>Sugerencia de episodio</option>
                    <option>Otro</option>
                  </select>
                </label>
                <label className="form__field">
                  <span className="form__label">Mensaje</span>
                  <textarea className="form__input form__textarea" name="mensaje" rows="5" required value={form.mensaje} onChange={handleChange} />
                </label>
                <Button variant="primary" size="lg" type="submit">Enviar mensaje</Button>
                <p className="form__note">
                  Al enviar intentamos abrir tu cliente de correo, dirigido a {CONTACT_EMAIL}. Si no tienes uno configurado, te dejamos el mensaje listo para copiar.
                </p>
              </form>
            )}
          </div>
        </section>
      );
    }

    // ── Footer ───────────────────────────────────────────────────────────────
    function Footer() {
      return (
        <footer className="footer">
          <img src="./assets/logo-white.png" alt="El Pasaporte Sinfónico" />
          <p className="footer__tag">El podcast donde la música viaja</p>
          <div className="footer__links">
            {NAV_LINKS.map(l => <a key={l.href} href={l.href}>{l.label}</a>)}
            {SOCIALS.map(s => <a key={s.label} href={s.href} target="_blank" rel="noopener noreferrer">{s.label}</a>)}
          </div>
          <p className="footer__copy">© 2026 El Pasaporte Sinfónico · Turismo sonoro y regenerativo</p>
        </footer>
      );
    }

    // ── PhotoStrip ───────────────────────────────────────────────────────────
    function PhotoStrip({ src, alt, text }) {
      return (
        <div className="photo-strip">
          <img src={src} alt={alt} loading="lazy" />
          <div className="photo-strip__overlay">
            <p className="photo-strip__text" dangerouslySetInnerHTML={{ __html: text }} />
          </div>
        </div>
      );
    }

    // ── App ──────────────────────────────────────────────────────────────────
    function App() {
      return (
        <>
          <Nav />
          <Hero />
          <Manifiesto />
          <PhotoStrip
            src="https://images.unsplash.com/photo-1452421822248-d4c2b47f0c81?auto=format&fit=crop&w=1920&q=80"
            alt="Mapa vintage de viaje"
            text="Porque la mejor manera de entender un género es <em>visitando la ciudad que lo inventó.</em>"
          />
          <Episodios />
          <PhotoStrip
            src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?auto=format&fit=crop&w=1920&q=80"
            alt="Concierto en vivo"
            text="Escucha el episodio, sigue la guía y <em>planea tu propio circuito sonoro.</em>"
          />
          <Guias />
          <Redes />
          <Contacto />
          <Footer />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
